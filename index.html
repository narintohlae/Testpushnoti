<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาเข้า-ออกพนักงาน (SPA)</title>
    <style>
        /* --- ตั้งค่าสีและรูปแบบพื้นฐาน (Flat Minimal) --- */
        :root {
            --primary: #000000;
            --success: #059669;
            --danger: #dc2626;
            --bg-color: #fcfcfc;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- แถบเมนูด้านบน --- */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .nav-link.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* --- พื้นที่แสดงผลหลัก --- */
        main {
            flex: 1;
            max-width: 600px;
            margin: 3rem auto;
            width: 100%;
            padding: 0 1rem;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border: 1px solid var(--border);
            border-radius: 0;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ดีไซน์ส่วน Dashboard --- */
        .live-clock {
            font-size: 4rem;
            font-weight: 300;
            color: var(--text-main);
            margin: 1rem 0 0.5rem 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .live-date {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1rem;
            font-weight: 400;
        }

        .status-badge {
            display: inline-block;
            padding: 0.35rem 1.25rem;
            border: 1px solid;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .status-in { border-color: var(--success); color: var(--success); background: transparent; }
        .status-out { border-color: var(--border); color: var(--text-muted); background: transparent; }

        .action-btn {
            border: 1px solid transparent;
            padding: 1rem 3rem;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            max-width: 300px;
        }

        .action-btn:active { opacity: 0.7; }
        
        .btn-in { background-color: var(--primary); color: white; }
        .btn-in:hover { background-color: #333; }

        .btn-out { background-color: white; color: var(--primary); border-color: var(--primary); }
        .btn-out:hover { background-color: #f9fafb; }

        /* --- ดีไซน์ส่วน History --- */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            text-align: left;
        }

        .history-table th, .history-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .history-table th { 
            background-color: transparent; 
            color: var(--primary); 
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary);
        }
        
        .type-badge {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid;
        }

        .empty-state {
            color: var(--text-muted);
            padding: 3rem 1rem;
            font-style: normal;
            text-align: center;
        }

        .clear-btn {
            margin-top: 2rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }
        .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* --- การปรับแก้สำหรับมือถือ (Responsive) --- */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                padding: 1.5rem 1rem;
            }
            
            nav {
                width: 100%;
                justify-content: center;
                gap: 1rem;
            }

            .nav-link {
                padding: 0.5rem;
                font-size: 0.8rem;
            }

            main {
                margin: 1.5rem auto;
            }

            .card {
                padding: 2rem 1rem;
                border-left: none;
                border-right: none;
            }

            .live-clock {
                font-size: 3rem;
            }

            .action-btn {
                padding: 1rem 2rem;
            }

            .table-responsive {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin-top: 1rem;
            }

            .history-table th, .history-table td {
                padding: 1rem 0.5rem;
                font-size: 0.85rem;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TIME TRACK</div>
        <nav>
            <a class="nav-link active" onclick="navigateTo('dashboard')" id="nav-dashboard">หน้าจอหลัก</a>
            <a class="nav-link" onclick="navigateTo('history')" id="nav-history">ประวัติ</a>
        </nav>
    </header>

    <main>
        <!-- เนื้อหาจะถูกแทรกที่นี่โดย JavaScript -->
        <div id="app-content"></div>
    </main>

    <script>
        /* =========================================
           ส่วนที่ 1: การจัดการข้อมูล (State Management)
           ========================================= */
        
        // ดึงข้อมูลจาก LocalStorage ถ้าไม่มีให้เป็น Array ว่าง
        let records = JSON.parse(localStorage.getItem('timeRecords')) || [];

        // เช็คสถานะปัจจุบัน (ดึงจาก record ล่าสุด)
        function getCurrentStatus() {
            if (records.length === 0) return 'OUT';
            return records[records.length - 1].type;
        }

        // ฟังก์ชันบันทึกเวลา
        function recordTime(type) {
            const now = new Date();
            const newRecord = {
                id: Date.now(),
                type: type, // 'IN' หรือ 'OUT'
                timestamp: now.toISOString(),
                timeString: now.toLocaleTimeString('th-TH'),
                dateString: now.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })
            };

            // เพิ่มข้อมูลใหม่ลงใน Array
            records.push(newRecord);
            
            // บันทึกลง LocalStorage
            localStorage.setItem('timeRecords', JSON.stringify(records));

            // รีเฟรชหน้าจอ Dashboard ทันที
            renderDashboard();
            
            // แจ้งเตือน
            alert(`บันทึกเวลา${type === 'IN' ? 'เข้า' : 'ออก'}งานสำเร็จ! (${newRecord.timeString})`);
        }

        // ล้างข้อมูลทั้งหมด
        function clearHistory() {
            if(confirm('คุณแน่ใจหรือไม่ว่าต้องการลบประวัติทั้งหมด?')) {
                records = [];
                localStorage.removeItem('timeRecords');
                renderHistory();
            }
        }


        /* =========================================
           ส่วนที่ 2: การสร้างหน้าจอ (View Rendering)
           ========================================= */
        
        const contentDiv = document.getElementById('app-content');
        let clockInterval; // ตัวแปรสำหรับหยุดนาฬิกาเวลาเปลี่ยนหน้า

        // 2.1 หน้า Dashboard
        function renderDashboard() {
            const status = getCurrentStatus();
            const isClockedIn = status === 'IN';

            let buttonHTML = '';
            let statusHTML = '';

            if (isClockedIn) {
                statusHTML = `<div class="status-badge status-in">สถานะ: กำลังทำงาน</div>`;
                buttonHTML = `<button class="action-btn btn-out" onclick="recordTime('OUT')">เลิกงาน (Clock Out)</button>`;
            } else {
                statusHTML = `<div class="status-badge status-out">สถานะ: ยังไม่เข้างาน</div>`;
                buttonHTML = `<button class="action-btn btn-in" onclick="recordTime('IN')">เข้างาน (Clock In)</button>`;
            }

            contentDiv.innerHTML = `
                <div class="card">
                    <h2 style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-top: 0; margin-bottom: 2rem;">บันทึกเวลาพนักงาน</h2>
                    ${statusHTML}
                    <div class="live-clock" id="clockDisplay">00:00:00</div>
                    <div class="live-date" id="dateDisplay">กำลังโหลดวันเวลา...</div>
                    <div style="margin-top: 2rem;">
                        ${buttonHTML}
                    </div>
                </div>
            `;

            // เริ่มทำงานนาฬิกา Real-time
            startClock();
        }

        // ฟังก์ชันควบคุมนาฬิกา Real-time
        function startClock() {
            clearInterval(clockInterval); // เคลียร์ของเก่าก่อน
            
            const tick = () => {
                const now = new Date();
                const clockEl = document.getElementById('clockDisplay');
                const dateEl = document.getElementById('dateDisplay');
                
                if(clockEl && dateEl) {
                    clockEl.textContent = now.toLocaleTimeString('th-TH');
                    dateEl.textContent = now.toLocaleDateString('th-TH', { 
                        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
                    });
                }
            };
            
            tick(); // รันทันที 1 ครั้ง
            clockInterval = setInterval(tick, 1000); // รันทุก 1 วินาที
        }

        // 2.2 หน้าประวัติ (History)
        function renderHistory() {
            clearInterval(clockInterval); // หยุดนาฬิกาเมื่อไม่ได้อยู่หน้า Dashboard

            let tableRows = '';
            
            if (records.length === 0) {
                tableRows = `<tr><td colspan="3" class="empty-state">ยังไม่มีประวัติการบันทึกเวลา</td></tr>`;
            } else {
                // เรียงจากใหม่ไปเก่า
                const reversedRecords = [...records].reverse();
                
                reversedRecords.forEach(rec => {
                    const badgeClass = rec.type === 'IN' ? 'status-in' : 'status-out';
                    const badgeText = rec.type === 'IN' ? 'เข้างาน' : 'ออกงาน';
                    
                    tableRows += `
                        <tr>
                            <td>${rec.dateString}</td>
                            <td>${rec.timeString}</td>
                            <td><span class="type-badge ${badgeClass}">${badgeText}</span></td>
                        </tr>
                    `;
                });
            }

            contentDiv.innerHTML = `
                <div class="card" style="text-align: left;">
                    <h2 style="margin-top: 0; font-size: 1.25rem; font-weight: 600; letter-spacing: -0.5px;">ประวัติการบันทึกเวลา</h2>
                    <div class="table-responsive">
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>วันที่</th>
                                    <th>เวลา</th>
                                    <th>ประเภท</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                    ${records.length > 0 ? `<button class="clear-btn" onclick="clearHistory()">ล้างประวัติทั้งหมด</button>` : ''}
                </div>
            `;
        }

        /* =========================================
           ส่วนที่ 3: ระบบสลับหน้า (SPA Routing)
           ========================================= */

        function navigateTo(page) {
            // 1. เปลี่ยนหน้าตา UI ของปุ่มเมนู
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById('nav-' + page).classList.add('active');

            // 2. อัปเดต URL Hash
            window.location.hash = page;

            // 3. เรียกฟังก์ชันแสดงผลเนื้อหาตามที่เลือก
            if (page === 'dashboard') {
                renderDashboard();
            } else if (page === 'history') {
                renderHistory();
            }
        }

        // จัดการเมื่อเปิดเว็บครั้งแรก (อ่านจาก URL Hash)
        window.addEventListener('load', () => {
            const page = window.location.hash.replace('#', '') || 'dashboard';
            navigateTo(page);
        });

        // จัดการเมื่อกดปุ่ม Back/Forward ของเบราว์เซอร์
        window.addEventListener('hashchange', () => {
            const page = window.location.hash.replace('#', '') || 'dashboard';
            navigateTo(page);
        });

    </script>
</body>
</html>
