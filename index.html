<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkFlow - Employee Management</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons for modern app icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts: Space Grotesk for a geometric, modern 3D UI feel -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Native App Feel Resets */
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f0fdf4;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        /* Mobile Container */
        #app-container {
            max-width: 430px;
            margin: 0 auto;
            height: 100vh;
            height: 100dvh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 3D UI DESIGN SYSTEM */
        .btn-3d {
            border: 3px solid #1f2937;
            border-radius: 16px;
            box-shadow: 4px 6px 0px #1f2937;
            transition: all 0.1s ease;
            position: relative;
            font-weight: 700;
        }
        .btn-3d:active {
            box-shadow: 0px 0px 0px #1f2937;
            transform: translate(4px, 6px);
        }
        
        /* Smaller 3D button for lists */
        .btn-sm-3d {
            border: 2px solid #1f2937;
            border-radius: 10px;
            box-shadow: 2px 3px 0px #1f2937;
            transition: all 0.1s ease;
            font-weight: 700;
        }
        .btn-sm-3d:active {
            box-shadow: 0px 0px 0px #1f2937;
            transform: translate(2px, 3px);
        }

        .card-3d {
            border: 2px solid #1f2937;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #1f2937;
            background-color: #ffffff;
            margin-bottom: 16px;
        }

        /* Isometric Map */
        .iso-container { perspective: 1000px; padding: 40px 0; display: flex; justify-content: center; overflow: visible; }
        .iso-grid {
            display: grid; grid-template-columns: repeat(3, 60px); gap: 20px;
            transform: rotateX(60deg) rotateY(0deg) rotateZ(-45deg); transform-style: preserve-3d;
        }
        .iso-cube {
            width: 60px; height: 60px; background: #e5e7eb; border: 2px solid #1f2937; position: relative;
            transition: all 0.3s ease; box-shadow: -5px 5px 0px rgba(0,0,0,0.1);
        }
        .iso-cube.active {
            background: #4ade80; transform: translateZ(20px) translate(-5px, -5px);
            box-shadow: -10px 10px 0px #166534, inset 0 0 10px rgba(255,255,255,0.5); border-color: #14532d;
        }
        .iso-cube.active::before, .iso-cube.active::after { content: ''; position: absolute; border: 2px solid #14532d; background: #22c55e; }
        .iso-cube.active::before { width: 20px; height: 100%; top: 0; left: -22px; transform-origin: right; transform: skewY(-45deg); }
        .iso-cube.active::after { width: 100%; height: 20px; bottom: -22px; left: 0; transform-origin: top; transform: skewX(-45deg); }

        /* Toggles */
        .toggle-checkbox:checked { right: 0; border-color: #4ade80; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4ade80; }
        .toggle-label { transition: background-color 0.2s; border: 2px solid #1f2937; box-shadow: 2px 2px 0px #1f2937; }
        .toggle-checkbox { right: 0; z-index: 1; border: 2px solid #1f2937; }
        
        /* Task checkbox */
        .task-checkbox.checked { background-color: #1f2937; color: white; }
    </style>
</head>
<body class="text-gray-800 flex items-center justify-center min-h-screen">

    <div id="app-container">
        <!-- Top Header -->
        <header id="app-header" class="px-6 pt-12 pb-4 bg-white border-b-2 border-gray-800 z-10 flex justify-between items-center shadow-sm">
            <h1 class="text-xl font-bold tracking-tight" id="header-title">WorkFlow</h1>
            <div id="header-profile" class="hidden h-10 w-10 rounded-full border-2 border-gray-800 flex items-center justify-center font-bold text-lg shadow-[2px_2px_0_0_#1f2937] cursor-pointer" onclick="App.logout()"></div>
        </header>

        <!-- Main Content Area -->
        <main id="app-content" class="flex-1 overflow-y-auto no-scrollbar bg-[#f8fafc] p-6 relative">
            <!-- Dynamic Content -->
        </main>

        <!-- Bottom Navigation Bar -->
        <nav id="app-nav" class="hidden bg-white border-t-2 border-gray-800 pb-6 pt-3 px-4 z-10 flex overflow-x-auto no-scrollbar gap-2 items-center">
            <!-- Dynamic Nav Items -->
        </nav>
    </div>

    <!-- APPLICATION LOGIC -->
    <script>
        // 1. Database & State
        const db = {
            users: [
                { id: 'u1', name: 'Alice Smith', role: 'employee', initials: 'AS', color: 'bg-pink-300', phone: '555-0101', email: 'alice@workflow.com' },
                { id: 'u2', name: 'Bob Jones', role: 'employee', initials: 'BJ', color: 'bg-blue-300', phone: '555-0102', email: 'bob@workflow.com' },
                { id: 'u3', name: 'Charlie (Owner)', role: 'owner', initials: 'CH', color: 'bg-yellow-300', phone: '555-0100', email: 'charlie@workflow.com' }
            ],
            logs: [
                { id: 1, userId: 'u1', type: 'IN', time: new Date(Date.now() - 7200000).toISOString() },
                { id: 2, userId: 'u2', type: 'IN', time: new Date(Date.now() - 3600000).toISOString() }
            ],
            tasks: [
                { id: 1, title: 'Prepare weekly report', assignedTo: 'u1', isDone: false, created: new Date().toISOString() },
                { id: 2, title: 'Restock supply closet', assignedTo: 'u2', isDone: true, created: new Date().toISOString() },
                { id: 3, title: 'Water office plants', assignedTo: 'u1', isDone: false, created: new Date().toISOString() }
            ],
            timeOffRequests: [
                { id: 1, userId: 'u2', date: '2026-05-10', reason: 'Vacation', status: 'approved' },
                { id: 2, userId: 'u1', date: '2026-05-15', reason: 'Doctor Appointment', status: 'pending' }
            ],
            announcements: [
                { id: 1, title: 'Welcome to WorkFlow!', content: 'We are testing our new employee portal. Please clock in daily.', date: new Date().toISOString(), priority: 'high' }
            ],
            expenses: [
                { id: 1, userId: 'u1', amount: 45.50, description: 'Client Coffee', status: 'approved', date: new Date().toISOString() },
                { id: 2, userId: 'u2', amount: 120.00, description: 'Office Supplies', status: 'pending', date: new Date().toISOString() }
            ],
            kudos: [
                { id: 1, fromId: 'u3', toId: 'u1', message: 'Great job on the presentation today! Really appreciate the hard work.', date: new Date().toISOString() }
            ],
            moods: [
                { id: 1, userId: 'u1', type: 'great', date: new Date().toISOString() },
                { id: 2, userId: 'u2', type: 'okay', date: new Date().toISOString() }
            ],
            tickets: [
                { id: 1, userId: 'u2', title: 'Coffee machine needs descaling', status: 'open', date: new Date().toISOString() }
            ],
            suggestions: [
                { id: 1, userId: 'u2', title: 'Casual Fridays', description: 'Allow jeans and casual wear on Fridays to boost morale.', votes: ['u1', 'u2'], status: 'open', date: new Date().toISOString() }
            ],
            polls: [
                { 
                    id: 1, 
                    question: 'What should we cater for Friday lunch?', 
                    options: [
                        { text: 'Pizza', votes: ['u1'] },
                        { text: 'Sushi', votes: ['u2', 'u3'] },
                        { text: 'Tacos', votes: [] }
                    ],
                    status: 'active',
                    date: new Date().toISOString()
                }
            ],
            events: [
                { id: 1, title: 'Company Townhall', date: '2026-05-01', type: 'meeting', attendees: ['u1', 'u2'] },
                { id: 2, title: 'Alice\'s Birthday Lunch', date: '2026-05-12', type: 'party', attendees: ['u2', 'u3'] }
            ],
            goals: [
                { id: 1, title: 'Q2 Revenue Target', current: 15000, target: 50000, unit: '$', prefix: true, color: 'bg-emerald-400' },
                { id: 2, title: 'New Customer Signups', current: 350, target: 500, unit: ' users', prefix: false, color: 'bg-purple-400' }
            ]
        };

        const state = {
            currentUser: null,
            currentView: 'login',
            currentModuleId: null, // Tracks which module tab is active
            features: {
                timeClock: true,
                taskManager: true, 
                timeOff: true, 
                announcements: true, 
                expenses: true, 
                kudos: true, 
                moodTracker: true,
                helpDesk: true,
                suggestions: true, 
                polls: true,
                events: true,
                directory: true,
                goals: true // NEW: Goals Module
            }
        };

        // 2. Application Core Controller
        const App = {
            modules: [],

            init: function() { this.renderLogin(); },
            registerModule: function(module) { this.modules.push(module); },

            login: function(userId) {
                state.currentUser = db.users.find(u => u.id === userId);
                const profile = document.getElementById('header-profile');
                profile.classList.remove('hidden');
                profile.textContent = state.currentUser.initials;
                profile.className = `hidden h-10 w-10 rounded-full border-2 border-gray-800 flex items-center justify-center font-bold text-lg shadow-[2px_2px_0_0_#1f2937] cursor-pointer ${state.currentUser.color}`;
                profile.classList.remove('hidden');
                
                if (state.currentUser.role === 'owner') this.navigate('owner_dashboard');
                else this.navigate('employee_home');
            },

            logout: function() {
                state.currentUser = null;
                document.getElementById('header-profile').classList.add('hidden');
                document.getElementById('app-nav').classList.add('hidden');
                this.navigate('login');
            },

            navigate: function(view, moduleId = null) {
                state.currentView = view;
                state.currentModuleId = moduleId;
                const content = document.getElementById('app-content');
                content.innerHTML = ''; 
                content.scrollTop = 0;

                if (view === 'login') {
                    this.renderLogin();
                    document.getElementById('app-nav').classList.add('hidden');
                    document.getElementById('header-title').innerText = "Login";
                } else if (view === 'owner_dashboard') {
                    this.renderOwnerDashboard();
                    this.renderNav();
                    document.getElementById('header-title').innerText = "Dashboard";
                } else if (view === 'employee_home') {
                    this.renderEmployeeHome();
                    this.renderNav();
                    document.getElementById('header-title').innerText = "My Portal";
                } else if (view === 'settings') {
                    this.renderSettings();
                    this.renderNav();
                    document.getElementById('header-title').innerText = "App Settings";
                } else if (view === 'module' && moduleId) {
                    const mod = this.modules.find(m => m.id === moduleId);
                    if (mod && state.features[mod.id]) {
                        content.innerHTML = mod.renderUserView();
                        document.getElementById('header-title').innerText = mod.name;
                        if(mod.onLoad) mod.onLoad();
                    }
                    this.renderNav();
                }
            },

            // --- Core Views ---
            renderLogin: function() {
                const content = document.getElementById('app-content');
                let html = `
                    <div class="flex flex-col items-center justify-center h-full space-y-8 pb-12">
                        <div class="w-24 h-24 bg-purple-400 rounded-2xl border-4 border-gray-800 shadow-[6px_6px_0_0_#1f2937] flex items-center justify-center transform rotate-12 mb-4">
                            <i class="ph-fill ph-intersect text-5xl text-white"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-center">Welcome to WorkFlow</h2>
                        <p class="text-gray-500 text-center mb-6">Select your profile to continue.</p>
                        <div class="w-full space-y-4">
                `;
                db.users.forEach(user => {
                    html += `
                        <button onclick="App.login('${user.id}')" class="btn-3d w-full py-4 px-6 bg-white flex items-center space-x-4">
                            <div class="h-12 w-12 rounded-full border-2 border-gray-800 ${user.color} flex items-center justify-center font-bold text-lg">${user.initials}</div>
                            <div class="text-left flex-1">
                                <div class="font-bold text-lg">${user.name}</div>
                                <div class="text-sm text-gray-500 uppercase tracking-wider">${user.role}</div>
                            </div>
                            <i class="ph-bold ph-caret-right text-xl"></i>
                        </button>`;
                });
                html += `</div></div>`;
                content.innerHTML = html;
            },

            renderEmployeeHome: function() {
                const content = document.getElementById('app-content');
                let html = `<div class="space-y-6">
                    <div class="mb-4">
                        <h2 class="text-2xl font-bold">Hello, ${state.currentUser.name.split(' ')[0]}!</h2>
                        <p class="text-gray-500">What would you like to do today?</p>
                    </div>
                `;
                this.modules.forEach(mod => {
                    if (state.features[mod.id] && mod.renderWidget) html += mod.renderWidget();
                });
                html += `</div>`;
                content.innerHTML = html;
                this.modules.forEach(mod => {
                    if (state.features[mod.id] && mod.onWidgetLoad) setTimeout(() => mod.onWidgetLoad(), 0);
                });
            },

            renderOwnerDashboard: function() {
                const content = document.getElementById('app-content');
                const activeUsers = db.users.filter(u => u.role !== 'owner' && isClockedIn(u.id));

                let html = `
                    <div class="space-y-6">
                        <div class="flex justify-between items-end">
                            <div>
                                <h2 class="text-2xl font-bold">Overview</h2>
                                <p class="text-gray-500">Live Office Status</p>
                            </div>
                            <div class="bg-gray-800 text-white px-3 py-1 rounded-lg font-bold text-sm">
                                <span class="text-green-400">●</span> ${activeUsers.length} Active
                            </div>
                        </div>

                        <!-- ISOMETRIC OFFICE MAP -->
                        <div class="card-3d bg-blue-50 overflow-hidden relative">
                            <h3 class="font-bold p-4 border-b-2 border-gray-800 bg-white">Floor Plan (Isometric)</h3>
                            <div class="iso-container">
                                <div class="iso-grid">
                `;
                const employees = db.users.filter(u => u.role !== 'owner');
                for(let i=0; i<6; i++) {
                    const emp = employees[i];
                    if (emp && isClockedIn(emp.id)) {
                        html += `<div class="iso-cube active flex items-center justify-center"><span class="text-xs font-bold text-white transform -rotate-45">${emp.initials}</span></div>`;
                    } else if (emp) {
                        html += `<div class="iso-cube flex items-center justify-center"><span class="text-xs font-bold text-gray-400 transform -rotate-45">${emp.initials}</span></div>`;
                    } else {
                        html += `<div class="iso-cube opacity-50"></div>`;
                    }
                }
                html += `</div></div><p class="text-xs text-center text-gray-500 pb-4">Green indicates clocked-in staff.</p></div>`;

                // Render Admin Widgets from Modules
                this.modules.forEach(mod => {
                    if (state.features[mod.id] && mod.renderAdminWidget) {
                        html += mod.renderAdminWidget();
                    }
                });

                html += `</div>`;
                content.innerHTML = html;
            },

            renderSettings: function() {
                const content = document.getElementById('app-content');
                let html = `
                    <div class="space-y-6">
                        <div>
                            <h2 class="text-2xl font-bold">App Features</h2>
                            <p class="text-gray-500">Turn modules on or off dynamically.</p>
                        </div>
                        <div class="card-3d p-4 space-y-4">
                `;
                this.modules.forEach(mod => {
                    const isChecked = state.features[mod.id] ? 'checked' : '';
                    html += `
                        <div class="flex items-center justify-between border-b-2 border-gray-100 pb-4 last:border-0 last:pb-0">
                            <div>
                                <div class="font-bold flex items-center gap-2"><i class="${mod.icon} text-xl"></i> ${mod.name}</div>
                                <div class="text-sm text-gray-500">${mod.description}</div>
                            </div>
                            <div class="relative inline-block w-14 h-8 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" id="toggle-${mod.id}" ${isChecked} class="toggle-checkbox absolute block w-8 h-8 rounded-full bg-white appearance-none cursor-pointer" onchange="App.toggleFeature('${mod.id}', this.checked)"/>
                                <label for="toggle-${mod.id}" class="toggle-label block overflow-hidden h-8 rounded-full bg-gray-300 cursor-pointer"></label>
                            </div>
                        </div>
                    `;
                });
                html += `
                        </div>
                        <div class="mt-8 pt-8 border-t-2 border-gray-200">
                             <button onclick="App.logout()" class="btn-3d w-full py-3 bg-red-100 text-red-600 flex justify-center items-center gap-2">
                                <i class="ph-bold ph-sign-out"></i> Switch User Profile
                             </button>
                        </div>
                    </div>
                `;
                content.innerHTML = html;
            },

            toggleFeature: function(moduleId, isEnabled) {
                state.features[moduleId] = isEnabled;
                this.renderNav();
                // Refresh view if owner dashboard
                if(state.currentView === 'owner_dashboard') this.renderOwnerDashboard();
            },

            renderNav: function() {
                const nav = document.getElementById('app-nav');
                if (!state.currentUser) return;
                nav.classList.remove('hidden');
                let html = '';

                const createNavItem = (icon, label, targetView, targetModule, isActive) => {
                    const clickAction = targetModule ? `App.navigate('${targetView}', '${targetModule}')` : `App.navigate('${targetView}')`;
                    return `
                    <button onclick="${clickAction}" class="flex flex-col items-center justify-center p-2 min-w-[64px] flex-shrink-0 transition-transform ${isActive ? 'text-gray-900 transform -translate-y-1' : 'text-gray-400'}">
                        <div class="relative">
                            <i class="${isActive ? 'ph-fill' : 'ph'} ${icon} text-3xl mb-1 drop-shadow-sm"></i>
                            ${isActive ? '<div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-gray-900 rounded-full"></div>' : ''}
                        </div>
                        <span class="text-[10px] font-bold mt-1">${label}</span>
                    </button>
                `};

                if (state.currentUser.role === 'owner') {
                    html += createNavItem('ph-squares-four', 'Overview', 'owner_dashboard', null, state.currentView === 'owner_dashboard');
                    html += createNavItem('ph-faders', 'Features', 'settings', null, state.currentView === 'settings');
                } else {
                    html += createNavItem('ph-house', 'Home', 'employee_home', null, state.currentView === 'employee_home');
                    
                    this.modules.forEach(mod => {
                        if (state.features[mod.id] && mod.hasUserTab) {
                            const isModActive = state.currentView === 'module' && state.currentModuleId === mod.id;
                            html += createNavItem(mod.icon, mod.name, 'module', mod.id, isModActive);
                        }
                    });
                }
                nav.innerHTML = html;
            }
        };

        // --- HELPER FUNCTIONS ---
        function isClockedIn(userId) {
            const userLogs = db.logs.filter(l => l.userId === userId).sort((a,b) => new Date(b.time) - new Date(a.time));
            if (userLogs.length === 0) return false;
            return userLogs[0].type === 'IN';
        }
        function formatTime(isoString) {
            return new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }


        // =========================================
        // MODULE 1: TIME TRACKING 
        // =========================================
        const TimeTrackerModule = {
            id: 'timeClock', name: 'Time Clock', description: 'Allow employees to log work in and out times.', icon: 'ph-clock-countdown', hasUserTab: false,

            renderWidget: function() {
                const isWorking = isClockedIn(state.currentUser.id);
                const btnClass = isWorking ? "bg-red-400 shadow-[4px_6px_0_0_#991b1b] border-[#7f1d1d] text-white" : "bg-green-400 shadow-[4px_6px_0_0_#166534] border-[#14532d] text-white";
                const btnIcon = isWorking ? "ph-sign-out" : "ph-sign-in";
                const statusText = isWorking ? "Clocked In" : "Clocked Out";
                return `
                    <div class="card-3d p-6 text-center" id="time-widget-container">
                        <div class="flex justify-between items-center mb-6">
                            <div class="text-left">
                                <h3 class="text-xl font-bold">${statusText}</h3>
                                <p class="text-sm text-gray-500 font-bold" id="live-clock">--:--:--</p>
                            </div>
                            <div class="w-12 h-12 bg-gray-100 rounded-full border-2 border-gray-800 flex items-center justify-center shadow-inner">
                                <i class="ph-fill ph-clock text-2xl text-gray-800"></i>
                            </div>
                        </div>
                        <button onclick="TimeTrackerModule.toggleClock()" class="btn-3d w-full py-4 text-lg tracking-wider flex items-center justify-center gap-3 ${btnClass}">
                            <i class="ph-bold ${btnIcon} text-xl"></i> ${isWorking ? "CLOCK OUT" : "CLOCK IN"}
                        </button>
                    </div>
                `;
            },
            onWidgetLoad: function() {
                const updateTime = () => { if(document.getElementById('live-clock')) document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); };
                updateTime();
                if(this.timer) clearInterval(this.timer);
                this.timer = setInterval(updateTime, 1000);
            },
            toggleClock: function() {
                db.logs.push({ id: Date.now(), userId: state.currentUser.id, type: isClockedIn(state.currentUser.id) ? 'OUT' : 'IN', time: new Date().toISOString() });
                App.renderEmployeeHome();
            },
            renderAdminWidget: function() {
                const recentLogs = [...db.logs].sort((a,b) => new Date(b.time) - new Date(a.time)).slice(0, 4);
                let html = `<div class="card-3d p-4"><h3 class="font-bold border-b-2 border-gray-100 pb-2 mb-3 flex items-center gap-2"><i class="ph-fill ph-clock-counter-clockwise"></i> Time Logs</h3><div class="space-y-3">`;
                if(recentLogs.length === 0) html += `<p class="text-gray-500 text-center py-2 text-sm">No activity.</p>`;
                recentLogs.forEach(log => {
                    const user = db.users.find(u => u.id === log.userId);
                    html += `
                        <div class="flex items-center justify-between hover:bg-gray-50 rounded transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-6 h-6 rounded-full border border-gray-800 ${user.color} flex items-center justify-center text-[10px] font-bold">${user.initials}</div>
                                <div class="text-sm font-bold">${user.name} <span class="${log.type === 'OUT' ? 'text-red-500' : 'text-green-500'}">${log.type}</span></div>
                            </div>
                            <div class="text-xs text-gray-500 font-bold">${formatTime(log.time)}</div>
                        </div>`;
                });
                return html + `</div></div>`;
            }
        };

        // =========================================
        // MODULE 2: TASK MANAGER (NEW FEATURE)
        // =========================================
        const TaskManagerModule = {
            id: 'taskManager', name: 'Tasks', description: 'Assign and track daily employee tasks.', icon: 'ph-check-square-offset', hasUserTab: true,

            // Full Screen View for Employee
            renderUserView: function() {
                const myTasks = db.tasks.filter(t => t.assignedTo === state.currentUser.id);
                const pending = myTasks.filter(t => !t.isDone);
                const completed = myTasks.filter(t => t.isDone);

                let html = `
                    <div class="space-y-6 pb-20">
                        <div>
                            <h2 class="text-2xl font-bold">Your Tasks</h2>
                            <p class="text-gray-500">Tap to mark as complete.</p>
                        </div>
                        
                        <!-- Progress Bar -->
                        <div class="bg-gray-200 rounded-full h-3 border border-gray-800 overflow-hidden">

                `;

                poll.options.forEach((opt, index) => {
                    const pct = totalVotes > 0 ? Math.round((opt.votes.length / totalVotes) * 100) : 0;

                    if (userVoted) {
                        // Show results view

                        const textColor = isMyVote ? 'font-bold text-indigo-900' : 'text-gray-600';

                    <div class="mb-4 space-y-2">
                        <input type="text" id="poll-question" placeholder="Ask the team a question..." class="w-full border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent font-bold">
                        <input type="text" id="poll-options" placeholder="Options (comma separated, e.g. Pizza, Sushi)" class="w-full border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent">
                        <button onclick="PollsModule.createPoll()" class="btn-sm-3d w-full bg-indigo-400 text-white py-1 text-xs flex items-center justify-center gap-1">
                            <i class="ph-bold ph-plus"></i> Create Poll
                        </button>
                    </div>

                    <div class="space-y-3 border-t-2 border-gray-800 border-dashed pt-3">
            `;

            if(activePolls.length === 0) {
                html += `<p class="text-xs text-gray-500 text-center py-2">No active polls.</p>`;
            } else {
                activePolls.forEach(poll => {
                    let total = 0;
                    poll.options.forEach(o => total += o.votes.length);
                    // Find leading option
                    let leading = poll.options.reduce((prev, current) => (prev.votes.length > current.votes.length) ? prev : current);

                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-xl p-3 shadow-[2px_2px_0_0_#1f2937]">
                            <div class="text-sm font-bold text-gray-800 leading-tight mb-1">${poll.question}</div>
                            <div class="flex justify-between items-end">
                                <div class="text-xs text-gray-600">
                                    Leading: <span class="font-bold text-indigo-600">${total > 0 ? leading.text : 'None yet'}</span>
                                </div>
                                <span class="bg-gray-100 px-2 py-0.5 rounded text-[10px] font-bold border border-gray-300">${total} votes</span>
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            return html;
        },

        createPoll: function() {
            const q = document.getElementById('poll-question').value.trim();
            const optString = document.getElementById('poll-options').value.trim();
            
            if(q && optString) {
                const optArray = optString.split(',').map(s => s.trim()).filter(s => s.length > 0);
                if(optArray.length >= 2) {
                    const formattedOptions = optArray.map(text => ({ text: text, votes: [] }));
                    db.polls.push({
                        id: Date.now(),
                        question: q,
                        options: formattedOptions,
                        status: 'active',
                        date: new Date().toISOString()
                    });
                    App.renderOwnerDashboard();
                } else {
                    alert("Please provide at least 2 options."); // Basic fallback validation
                }
            }
        }
    };

    // =========================================
    // MODULE 11: COMPANY EVENTS / CALENDAR
    // =========================================
    const EventsModule = {
        id: 'events', name: 'Events', description: 'Company calendar and event RSVPs.', icon: 'ph-calendar-star', hasUserTab: true,

        // Full Screen View for Employee
        renderUserView: function() {
            const upcomingEvents = [...db.events].sort((a,b) => new Date(a.date) - new Date(b.date));
            
            let html = `
                <div class="space-y-6 pb-20">
                    <div>
                        <h2 class="text-2xl font-bold">Upcoming Events</h2>
                        <p class="text-gray-500">See what's happening and RSVP.</p>
                    </div>
                    <div class="space-y-4">
            `;

            if(upcomingEvents.length === 0) {
                html += `<div class="text-center text-gray-400 py-6"><p>No upcoming events.</p></div>`;
            }

            upcomingEvents.forEach(evt => {
                const eventDate = new Date(evt.date);
                const month = eventDate.toLocaleString('default', { month: 'short' }).toUpperCase();
                const day = eventDate.getDate();
                
                const isAttending = evt.attendees.includes(state.currentUser.id);
                const rsvpBtnClass = isAttending ? 'bg-teal-400 text-white' : 'bg-white text-gray-800';
                const rsvpText = isAttending ? '<i class="ph-bold ph-check"></i> Attending' : 'RSVP';

                let icon = 'ph-calendar-star';
                let iconColor = 'text-teal-500';
                if(evt.type === 'party') { icon = 'ph-confetti'; iconColor = 'text-pink-500'; }
                else if(evt.type === 'meeting') { icon = 'ph-users-three'; iconColor = 'text-blue-500'; }

                html += `
                    <div class="card-3d p-0 overflow-hidden bg-white flex">
                        <!-- Calendar Date Box -->
                        <div class="bg-gray-100 border-r-2 border-gray-800 p-4 flex flex-col items-center justify-center min-w-[80px]">
                            <span class="text-xs font-bold text-red-500 tracking-wider">${month}</span>
                            <span class="text-2xl font-bold text-gray-800 leading-none">${day}</span>
                        </div>
                        <!-- Event Details -->
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <i class="ph-fill ${icon} ${iconColor} text-lg"></i>
                                    <h3 class="font-bold text-lg leading-tight text-gray-800">${evt.title}</h3>
                                </div>
                                <p class="text-xs text-gray-500 font-bold mb-3">${evt.attendees.length} people going</p>
                            </div>
                            <button onclick="EventsModule.toggleRSVP(${evt.id})" class="btn-sm-3d w-full py-2 text-sm flex items-center justify-center gap-2 ${rsvpBtnClass} transition-colors">
                                ${rsvpText}
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            return html;
        },

        toggleRSVP: function(id) {
            const evt = db.events.find(e => e.id === id);
            if(evt) {
                const idx = evt.attendees.indexOf(state.currentUser.id);
                if(idx > -1) {
                    evt.attendees.splice(idx, 1);
                } else {
                    evt.attendees.push(state.currentUser.id);
                }
                App.navigate('module', 'events');
            }
        },

        // Widget for Owner Dashboard
        renderAdminWidget: function() {
            const upcomingEvents = [...db.events].sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0, 2);
            
            let html = `
                <div class="card-3d p-4 bg-teal-50">
                    <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                        <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-calendar-star text-teal-600"></i> Company Events</h3>
                    </div>
                    
                    <!-- Create Event Form -->
                    <div class="mb-4 space-y-2">
                        <input type="text" id="evt-title" placeholder="Event Name..." class="w-full border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent font-bold">
                        <div class="flex gap-2">
                            <input type="date" id="evt-date" class="flex-1 border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent">
                            <select id="evt-type" class="border-2 border-gray-800 rounded-lg px-1 text-sm bg-transparent outline-none">
                                <option value="general">General</option>
                                <option value="meeting">Meeting</option>
                                <option value="party">Party</option>
                            </select>
                        </div>
                        <button onclick="EventsModule.createEvent()" class="btn-sm-3d w-full bg-teal-400 text-white py-1 text-xs flex items-center justify-center gap-1">
                            <i class="ph-bold ph-plus"></i> Add Event
                        </button>
                    </div>

                    <div class="space-y-3 border-t-2 border-gray-800 border-dashed pt-3">
            `;

            if(upcomingEvents.length === 0) {
                html += `<p class="text-xs text-gray-500 text-center py-2">No upcoming events.</p>`;
            } else {
                upcomingEvents.forEach(evt => {
                    const eventDate = new Date(evt.date);
                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-xl p-3 shadow-[2px_2px_0_0_#1f2937] flex items-center justify-between">
                            <div>
                                <div class="text-sm font-bold text-gray-800 leading-tight">${evt.title}</div>
                                <div class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">${eventDate.toLocaleDateString()}</div>
                            </div>
                            <div class="bg-gray-100 px-2 py-1 rounded text-[10px] font-bold border border-gray-300 flex items-center gap-1">
                                <i class="ph-fill ph-users text-teal-500"></i> ${evt.attendees.length} RSVPs
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            return html;
        },

        createEvent: function() {
            const title = document.getElementById('evt-title').value.trim();
            const dateVal = document.getElementById('evt-date').value;
            const typeVal = document.getElementById('evt-type').value;
            
            if(title && dateVal) {
                db.events.push({
                    id: Date.now(),
                    title: title,
                    date: dateVal,
                    type: typeVal,
                    attendees: []
                });
                App.renderOwnerDashboard();
            }
        }
    };

    // =========================================
    // MODULE 12: TEAM DIRECTORY
    // =========================================
    const DirectoryModule = {
        id: 'directory', name: 'Team', description: 'Company directory and contact roster.', icon: 'ph-address-book', hasUserTab: true,

        // Full Screen View for Employee
        renderUserView: function() {
            let html = `
                <div class="space-y-6 pb-20">
                    <div>
                        <h2 class="text-2xl font-bold">Team Directory</h2>
                        <p class="text-gray-500">Contact your colleagues.</p>
                    </div>
                    <div class="space-y-4">
            `;
            
            db.users.forEach(user => {
                // Check if user is currently working
                const isOnline = isClockedIn(user.id);

                    ? '<span class="text-green-500 flex items-center justify-end gap-1"><i class="ph-fill ph-circle text-[8px]"></i> Active</span>' 
                    : '<span class="text-gray-400 flex items-center justify-end gap-1"><i class="ph-fill ph-circle text-[8px]"></i> Offline</span>';

                html += `
                    <div class="card-3d p-4 bg-white flex flex-col gap-3">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full border-2 border-gray-800 ${user.color} flex items-center justify-center text-lg font-bold shadow-[2px_2px_0_0_#1f2937] flex-shrink-0">${user.initials}</div>
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-lg text-gray-800 leading-tight truncate">${user.name}</div>

                            <div class="text-[10px] font-bold text-right">${statusHtml}</div>
                        </div>
                        <div class="flex gap-2 mt-1">

                                <i class="ph-fill ph-phone text-lg"></i> Call
                            </a>
                            <a href="mailto:${user.email}" class="flex-1 btn-sm-3d bg-gray-50 hover:bg-gray-100 text-gray-800 py-2 flex items-center justify-center gap-2 text-sm transition-colors">
                                <i class="ph-fill ph-envelope-simple text-lg"></i> Email
                            </a>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            return html;
        },

        // Widget for Owner Dashboard
        renderAdminWidget: function() {
            const employees = db.users.filter(u => u.role !== 'owner');
            
            return `
                <div class="card-3d p-4 bg-gray-50">
                    <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                        <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-users text-gray-700"></i> Team Management</h3>
                        <span class="bg-gray-200 text-gray-800 text-[10px] font-bold px-2 py-0.5 rounded-full border border-gray-300">${db.users.length} Total</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-4">You have <strong>${employees.length}</strong> active employees on your roster.</p>
                    
                    <!-- Simulated Invite Button (Opens Native Email App) -->
                    <a href="mailto:?subject=Join our WorkFlow Team&body=Please download the WorkFlow app to join our company portal." class="btn-sm-3d w-full bg-gray-800 text-white py-2 text-sm flex items-center justify-center gap-2 hover:bg-gray-700 transition-colors">
                        <i class="ph-bold ph-user-plus text-lg"></i> Invite New Employee
                    </a>
                </div>
            `;
        }
    };

    // =========================================
    // MODULE 13: COMPANY GOALS & TARGETS
    // =========================================
    const GoalsModule = {
        id: 'goals', name: 'Goals', description: 'Track company-wide targets and milestones.', icon: 'ph-target', hasUserTab: true,

        formatValue: function(val, unit, prefix) {
            return prefix ? `${unit}${val.toLocaleString()}` : `${val.toLocaleString()}${unit}`;
        },

        // Full Screen View for Employee
        renderUserView: function() {
            let html = `
                <div class="space-y-6 pb-20">
                    <div>
                        <h2 class="text-2xl font-bold">Company Goals</h2>
                        <p class="text-gray-500">Track our team's progress!</p>
                    </div>
                    <div class="space-y-5">
            `;

            if(db.goals.length === 0) {
                html += `<div class="text-center text-gray-400 py-6"><p>No active goals right now.</p></div>`;
            }

            db.goals.forEach(goal => {
                const pct = Math.min(100, Math.round((goal.current / goal.target) * 100));
                const currentFmt = this.formatValue(goal.current, goal.unit, goal.prefix);
                const targetFmt = this.formatValue(goal.target, goal.unit, goal.prefix);
                
                // Show a star icon if 100% completed
                const titleIcon = pct >= 100 ? '<i class="ph-fill ph-star text-yellow-500 ml-2 animate-pulse"></i>' : '';

                html += `
                    <div class="card-3d p-5 bg-white">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 rounded-full border-2 border-gray-800 ${goal.color} flex items-center justify-center shadow-[2px_2px_0_0_#1f2937]">
                                <i class="ph-bold ph-target text-gray-900 text-xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-lg leading-tight text-gray-800 flex items-center">${goal.title} ${titleIcon}</h3>
                                <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-1">Goal: ${targetFmt}</div>
                            </div>
                        </div>
                        
                        <!-- 3D Progress Bar -->
                        <div class="relative w-full h-8 bg-gray-100 rounded-full border-2 border-gray-800 overflow-hidden shadow-inner flex items-center px-3 z-0">
                            <!-- Fill -->
                            <div class="absolute top-0 left-0 h-full ${goal.color} transition-all duration-1000 -z-10 border-r-2 border-gray-800" style="width: ${pct}%"></div>
                            
                            <!-- Overlay Text -->
                            <div class="flex justify-between w-full text-xs font-bold text-gray-900 z-10 mix-blend-hard-light">
                                <span>${currentFmt}</span>
                                <span>${pct}%</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            return html;
        },

        // Widget for Owner Dashboard
        renderAdminWidget: function() {
            let html = `
                <div class="card-3d p-4 bg-purple-50">
                    <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                        <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-target text-purple-600"></i> Active Milestones</h3>
                    </div>
                    
                    <!-- Create Goal Form -->
                    <div class="mb-4 flex gap-2">
                        <input type="text" id="goal-new-title" placeholder="New Goal Name..." class="flex-1 border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent font-bold">
                        <input type="number" id="goal-new-target" placeholder="Target..." class="w-24 border-2 border-gray-800 rounded-lg px-2 py-1 text-sm outline-none focus:bg-white bg-transparent">
                        <button onclick="GoalsModule.createGoal()" class="btn-sm-3d bg-purple-400 text-white px-3 flex items-center justify-center">
                            <i class="ph-bold ph-plus"></i>
                        </button>
                    </div>

                    <div class="space-y-3 border-t-2 border-gray-800 border-dashed pt-3">
            `;

            if(db.goals.length === 0) {
                html += `<p class="text-xs text-gray-500 text-center py-2">No active goals.</p>`;
            } else {
                db.goals.forEach(goal => {
                    const pct = Math.min(100, Math.round((goal.current / goal.target) * 100));
                    const isDone = pct >= 100;
                    
                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-xl p-3 shadow-[2px_2px_0_0_#1f2937]">
                            <div class="flex justify-between items-center mb-2">
                                <div class="text-sm font-bold text-gray-800 leading-tight">${goal.title}</div>
                                <span class="text-xs font-bold ${isDone ? 'text-green-500' : 'text-purple-600'}">${pct}%</span>
                            </div>
                            
                            <!-- Mini Progress -->
                            <div class="w-full h-2 bg-gray-200 rounded-full mb-3 overflow-hidden">
                                <div class="h-full ${goal.color}" style="width: ${pct}%"></div>
                            </div>
                            
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-gray-500 font-bold">${this.formatValue(goal.current, goal.unit, goal.prefix)} / ${this.formatValue(goal.target, goal.unit, goal.prefix)}</span>
                                <button onclick="GoalsModule.addProgress(${goal.id})" class="btn-sm-3d bg-gray-800 text-white px-2 py-1 text-[10px] font-bold ${isDone ? 'opacity-50 pointer-events-none' : ''}">
                                    Add 10% Progress
                                </button>
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            return html;
        },

        createGoal: function() {
            const title = document.getElementById('goal-new-title').value.trim();
            const targetVal = parseFloat(document.getElementById('goal-new-target').value);
            
            if(title && !isNaN(targetVal) && targetVal > 0) {
                const colors = ['bg-red-400', 'bg-blue-400', 'bg-emerald-400', 'bg-yellow-400', 'bg-purple-400'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                
                db.goals.push({
                    id: Date.now(),
                    title: title,
                    current: 0,
                    target: targetVal,
                    unit: '', // Simplification for user-added goals
                    prefix: false,
                    color: randomColor
                });
                App.renderOwnerDashboard();
            }
        },

        addProgress: function(id) {
            const goal = db.goals.find(g => g.id === id);
            if(goal && goal.current < goal.target) {
                // Add roughly 10% of the target per click
                const increment = Math.max(1, Math.ceil(goal.target * 0.1));
                goal.current = Math.min(goal.target, goal.current + increment);
                App.renderOwnerDashboard();
            }
        }
    };

    // INITIALIZATION
    // =========================================
    App.registerModule(TimeTrackerModule);
    App.registerModule(TaskManagerModule); 
    App.registerModule(TimeOffModule); 
    App.registerModule(AnnouncementsModule); 
    App.registerModule(ExpensesModule);
    App.registerModule(KudosModule); 
    App.registerModule(MoodTrackerModule); 
    App.registerModule(HelpDeskModule);
    App.registerModule(SuggestionsModule); 
    App.registerModule(PollsModule); 
    App.registerModule(EventsModule); 
    App.registerModule(DirectoryModule); 
    App.registerModule(GoalsModule); // Register the new module!
    
    window.onload = () => App.init();

    </script>
