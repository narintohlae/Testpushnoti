<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลาเข้า-ออกงาน (Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center p-4 font-sans">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm p-6 mt-2 text-center relative">
        <h1 class="text-2xl font-bold text-gray-800">ระบบลงเวลาทำงาน</h1>
        <p class="text-gray-500 mt-1" id="currentDate">กำลังโหลดวันที่...</p>
        <div class="text-5xl font-mono font-bold text-blue-600 mt-4" id="currentTime">00:00:00</div>
    </div>

    <div class="w-full max-w-md mt-6 flex flex-col items-center">
        <button id="actionBtn" onclick="handleAction()" 
            class="w-48 h-48 rounded-full text-white text-3xl font-bold shadow-lg transition-transform transform active:scale-95 flex flex-col items-center justify-center bg-green-500 hover:bg-green-600">
            <span id="btnText">เข้างาน</span>
            <span id="btnSubText" class="text-sm font-normal mt-2 opacity-80">กดเพื่อบันทึกเวลา</span>
        </button>
        
        <div id="timerContainer" class="mt-6 text-center hidden">
            <p class="text-sm text-gray-500">เวลาทำงานรอบปัจจุบัน</p>
            <p class="text-2xl font-mono font-bold text-gray-800" id="liveTimer">00:00:00</p>
        </div>

        <p id="locationStatus" class="mt-4 text-xs text-gray-500 bg-white px-3 py-1 rounded-full shadow-sm">
            📍 กำลังตรวจสอบตำแหน่ง...
        </p>
    </div>

    <div class="w-full max-w-md mt-6 bg-white rounded-2xl shadow-sm p-6 flex-grow mb-4 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h2 class="text-lg font-bold text-gray-800">ประวัติการลงเวลา</h2>
            <button onclick="exportCSV()" class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full hover:bg-blue-200 font-bold">
                📥 โหลดไฟล์ส่ง HR
            </button>
        </div>
        <div id="logHistory" class="overflow-y-auto flex-grow space-y-3">
            </div>
    </div>

    <script>
        let isCheckedIn = false;
        let checkInTimeMs = null;
        let logs = JSON.parse(localStorage.getItem('timeLogs')) || [];

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
            document.getElementById('currentDate').innerText = now.toLocaleDateString('th-TH', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });

            // อัปเดตตัวจับเวลาทำงาน (ถ้าเข้างานอยู่)
            if (isCheckedIn && checkInTimeMs) {
                const diff = now.getTime() - checkInTimeMs;
                const hours = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const seconds = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
                document.getElementById('liveTimer').innerText = `${hours}:${minutes}:${seconds}`;
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function initApp() {
            if (logs.length > 0) {
                const lastLog = logs[0];
                if (lastLog.type === 'เข้างาน') {
                    isCheckedIn = true;
                    checkInTimeMs = lastLog.id; // ใช้ timestamp ของตอนที่กดเข้างาน
                }
            }
            updateButtonUI();
            renderLogs();
            checkLocation();
        }

        function checkLocation() {
            const statusText = document.getElementById('locationStatus');
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    () => { statusText.innerText = "📍 อยู่ในพื้นที่ (พร้อมลงเวลา)"; statusText.classList.replace('text-gray-500', 'text-green-600'); },
                    () => { statusText.innerText = "⚠️ ไม่สามารถระบุตำแหน่งได้"; statusText.classList.replace('text-gray-500', 'text-red-500'); }
                );
            }
        }

        function handleAction() {
            if (isCheckedIn) {
                // ป้องกันการเผลอกดออกงาน
                const confirmOut = confirm("คุณต้องการ 'ลงเวลาออกงาน' ใช่หรือไม่?");
                if (!confirmOut) return;
            }

            const now = new Date();
            const newLog = {
                id: now.getTime(),
                date: now.toLocaleDateString('th-TH'),
                time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                type: isCheckedIn ? 'ออกงาน' : 'เข้างาน'
            };

            logs.unshift(newLog);
            localStorage.setItem('timeLogs', JSON.stringify(logs));

            if (!isCheckedIn) {
                checkInTimeMs = newLog.id;
            } else {
                checkInTimeMs = null;
            }

            isCheckedIn = !isCheckedIn;
            updateButtonUI();
            renderLogs();
        }

        function updateButtonUI() {
            const btn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            const timerContainer = document.getElementById('timerContainer');
            
            if (isCheckedIn) {
                btn.classList.replace('bg-green-500', 'bg-red-500');
                btn.classList.replace('hover:bg-green-600', 'hover:bg-red-600');
                btnText.innerText = 'ออกงาน';
                timerContainer.classList.remove('hidden');
            } else {
                btn.classList.replace('bg-red-500', 'bg-green-500');
                btn.classList.replace('hover:bg-red-600', 'hover:bg-green-600');
                btnText.innerText = 'เข้างาน';
                timerContainer.classList.add('hidden');
            }
        }

        function renderLogs() {
            const logContainer = document.getElementById('logHistory');
            logContainer.innerHTML = '';
            if (logs.length === 0) {
                logContainer.innerHTML = '<p class="text-center text-gray-400 mt-4">ยังไม่มีประวัติการลงเวลา</p>';
                return;
            }
            logs.slice(0, 10).forEach(log => {
                const colorClass = log.type === 'เข้างาน' ? 'text-green-600 bg-green-50 border-green-100' : 'text-red-600 bg-red-50 border-red-100';
                logContainer.innerHTML += `
                    <div class="flex justify-between items-center p-3 rounded-lg border ${colorClass}">
                        <div class="flex flex-col">
                            <span class="font-bold">${log.type}</span>
                            <span class="text-xs text-gray-500">${log.date}</span>
                        </div>
                        <div class="font-mono font-bold text-lg">${log.time}</div>
                    </div>
                `;
            });
        }

        // ฟังก์ชันสร้างไฟล์ CSV และดาวน์โหลด
        function exportCSV() {
            if (logs.length === 0) {
                alert("ยังไม่มีข้อมูลให้ดาวน์โหลดครับ");
                return;
            }
            // ใส่ BOM เพื่อให้ Excel อ่านภาษาไทยได้ถูกต้อง
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "วันที่,เวลา,ประเภทการลงเวลา\n"; // หัวตาราง
            
            logs.forEach(log => {
                csvContent += `${log.date},${log.time},${log.type}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "ประวัติการลงเวลา.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        initApp();
    </script>
</body>
</html>
