<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Firebase Push</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* สไตล์สำหรับเนื้อหาทั่วไป */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #f2f2f7; /* สีพื้นหลังสไตล์ iOS */
            margin: 0;
            padding-bottom: 90px; /* เว้นที่ให้แถบเมนูด้านล่าง */
        }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; border-radius: 12px; border: none; cursor: pointer; background-color: #007aff; color: white; font-weight: bold; }
        #token-display { margin-top: 20px; padding: 15px; background: #fff; border-radius: 12px; word-break: break-all; font-size: 14px; color: #333; display: none; border: 1px solid #ccc;}
        
        /* สไตล์สำหรับแถบเมนูด้านล่าง (Bottom Navigation) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* หลบขีด Home ของ iOS */
            padding-top: 10px;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #8e8e93; /* สีเทาสำหรับเมนูที่ไม่ได้เลือก */
            font-size: 10px;
            font-weight: 500;
        }
        .nav-item.active {
            color: #007aff; /* สีฟ้าสำหรับหน้าปัจจุบัน */
        }
        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <h1>ทดสอบแอปเต็มรูปแบบ 🚀</h1>
    <p id="status">สถานะ: รอการอนุญาต</p>
    <button id="btn-permission">ขออนุญาตแจ้งเตือน</button>

    <div id="token-display"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        // Config ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
            authDomain: "time-tracker-46283.firebaseapp.com",
            projectId: "time-tracker-46283",
            storageBucket: "time-tracker-46283.firebasestorage.app",
            messagingSenderId: "882533547295",
            appId: "1:882533547295:web:4b78bfc84322c58a50042a",
            measurementId: "G-5DPBNCSWFW"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        const vapidKey = "BDNGswO_-C1zLdkCtXs7GEqf4mzS6oDVVT4MVwEmgK1M4acf-0fk-FzSa-wYaTUa-wg_3eLK2_TFFytdqz1WBYo";

        // รับข้อความตอนเปิดแอปอยู่ (Foreground)
        onMessage(messaging, (payload) => {
            console.log('ได้รับข้อความขณะเปิดแอป: ', payload);
            alert(`🔔 แจ้งเตือนใหม่!\nหัวข้อ: ${payload.notification.title}\nข้อความ: ${payload.notification.body}`);
        });

        document.getElementById('btn-permission').addEventListener('click', async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    document.getElementById('status').innerText = "กำลังเชื่อมต่อระบบ...";
                    
                    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                    
                    const currentToken = await getToken(messaging, { 
                        vapidKey: vapidKey,
                        serviceWorkerRegistration: registration 
                    });
                    
                    if (currentToken) {
                        document.getElementById('status').innerText = "พร้อมใช้งาน! ✅ นำ Token ไปทดสอบได้เลย";
                        const tokenBox = document.getElementById('token-display');
                        tokenBox.style.display = 'block';
                        tokenBox.innerText = currentToken;
                    } else {
                        document.getElementById('status').innerText = "ไม่สามารถสร้าง Token ได้";
                    }
                } else {
                    document.getElementById('status').innerText = "สถานะ: ปฏิเสธการแจ้งเตือน ❌";
                }
            } catch (err) {
                document.getElementById('status').innerText = "เกิดข้อผิดพลาด: " + err.message;
            }
        });
    </script>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>หน้าแรก</span>
        </a>
        <a href="page2.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>แชท</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">🔔</span>
            <span>แจ้งเตือน</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span>ตั้งค่า</span>
        </a>
    </nav>
</body>
</html>
